<!DOCTYPE html>
<html>
<head>
    <title>Earthquake Damage Risk Prediction</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            min-height: 100vh;
            background: linear-gradient(135deg, #dbeafe, #eff6ff, #f5f3ff);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container{
            width: 100%;
            max-width: 700px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.12);
            padding: 35px;
        }

        .title{
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
            font-weight: bold;
            color: #1e3a8a;
        }

        .subtitle{
            text-align: center;
            color: #475569;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .form-grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px 20px;
        }

        .form-group{
            display: flex;
            flex-direction: column;
        }

        label{
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: bold;
            color: #334155;
        }

        input, select{
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
            background: #f8fafc;
            transition: 0.3s;
        }

        input:focus, select:focus{
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
            background: white;
        }

        .full-width{
            grid-column: span 2;
        }

        button{
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 8px 18px rgba(79,70,229,0.25);
        }

        button:hover{
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(79,70,229,0.32);
        }

        .result{
            margin-top: 25px;
            padding: 18px;
            border-radius: 14px;
            text-align: center;
            font-size: 19px;
            font-weight: bold;
            display: none;
        }

        .low{
            display: block;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .medium{
            display: block;
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fcd34d;
        }

        .high{
            display: block;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .error{
            display: block;
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fca5a5;
        }

        @media (max-width: 700px){
            .form-grid{
                grid-template-columns: 1fr;
            }

            .full-width{
                grid-column: span 1;
            }

            .container{
                padding: 24px;
            }

            .title{
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">AI Building Risk Predictor</div>
    <div class="subtitle">Earthquake Damage Risk Assessment System</div>

    <div class="form-grid">
        <div class="form-group">
            <label>District ID</label>
            <input id="district_id" type="number" placeholder="Enter district id">
        </div>

        <div class="form-group">
            <label>Count Floors Before Earthquake</label>
            <input id="count_floors_pre_eq" type="number" placeholder="Enter floors count">
        </div>

        <div class="form-group">
            <label>Age of Building</label>
            <input id="age_building" type="number" placeholder="Enter building age">
        </div>

        <div class="form-group">
            <label>Plinth Area (sq ft)</label>
            <input id="plinth_area_sq_ft" type="number" placeholder="Enter area">
        </div>

        <div class="form-group">
            <label>Height Before Earthquake (ft)</label>
            <input id="height_ft_pre_eq" type="number" placeholder="Enter height">
        </div>

        <div class="form-group">
            <label>Land Surface Condition</label>
            <select id="land_surface_condition">
                <option value="Flat">Flat</option>
                <option value="Moderate slope">Moderate slope</option>
                <option value="Steep slope">Steep slope</option>
            </select>
        </div>

        <div class="form-group">
            <label>Foundation Type</label>
            <select id="foundation_type">
                <option value="Bamboo/Timber">Bamboo/Timber</option>
                <option value="Cement-Stone/Brick">Cement-Stone/Brick</option>
                <option value="Mud mortar-Stone/Brick">Mud mortar-Stone/Brick</option>
                <option value="Other">Other</option>
                <option value="RC">RC</option>
            </select>
        </div>

        <div class="form-group">
            <label>Roof Type</label>
            <select id="roof_type">
                <option value="Bamboo/Timber-Heavy roof">Bamboo/Timber-Heavy roof</option>
                <option value="Bamboo/Timber-Light roof">Bamboo/Timber-Light roof</option>
                <option value="RCC/RB/RBC">RCC/RB/RBC</option>
            </select>
        </div>

        <div class="form-group">
            <label>Ground Floor Type</label>
            <select id="ground_floor_type">
                <option value="Brick/Stone">Brick/Stone</option>
                <option value="Mud">Mud</option>
                <option value="Other">Other</option>
                <option value="RC">RC</option>
                <option value="Timber">Timber</option>
            </select>
        </div>

        <div class="form-group">
            <label>Other Floor Type</label>
            <select id="other_floor_type">
                <option value="Not applicable">Not applicable</option>
                <option value="RCC/RB/RBC">RCC/RB/RBC</option>
                <option value="TImber/Bamboo-Mud">TImber/Bamboo-Mud</option>
                <option value="Timber-Planck">Timber-Planck</option>
            </select>
        </div>

        <div class="form-group">
            <label>Position</label>
            <select id="position">
                <option value="Attached-1 side">Attached-1 side</option>
                <option value="Attached-2 side">Attached-2 side</option>
                <option value="Attached-3 side">Attached-3 side</option>
                <option value="Not attached">Not attached</option>
            </select>
        </div>

        <div class="form-group">
            <label>Plan Configuration</label>
            <select id="plan_configuration">
                <option value="Building with Central Courtyard">Building with Central Courtyard</option>
                <option value="E-shape">E-shape</option>
                <option value="H-shape">H-shape</option>
                <option value="L-shape">L-shape</option>
                <option value="Multi-projected">Multi-projected</option>
                <option value="Others">Others</option>
                <option value="Rectangular">Rectangular</option>
                <option value="Square">Square</option>
                <option value="T-shape">T-shape</option>
                <option value="U-shape">U-shape</option>
            </select>
        </div>
    </div>

    <button onclick="predict()">Predict Risk</button>

    <div class="result" id="result"></div>
</div>

<script>
function predict() {
    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            district_id: document.getElementById("district_id").value,
            count_floors_pre_eq: document.getElementById("count_floors_pre_eq").value,
            age_building: document.getElementById("age_building").value,
            plinth_area_sq_ft: document.getElementById("plinth_area_sq_ft").value,
            height_ft_pre_eq: document.getElementById("height_ft_pre_eq").value,
            land_surface_condition: document.getElementById("land_surface_condition").value,
            foundation_type: document.getElementById("foundation_type").value,
            roof_type: document.getElementById("roof_type").value,
            ground_floor_type: document.getElementById("ground_floor_type").value,
            other_floor_type: document.getElementById("other_floor_type").value,
            position: document.getElementById("position").value,
            plan_configuration: document.getElementById("plan_configuration").value
        })
    })
    .then(response => response.json())
    .then(data => {
        const resultBox = document.getElementById("result");

        if (data.error) {
            resultBox.className = "result error";
            resultBox.innerHTML = "Error: " + data.error;
        } else {
            let riskClass = "medium";

            if (data.risk_level.toLowerCase().includes("low")) {
                riskClass = "low";
            } else if (data.risk_level.toLowerCase().includes("high")) {
                riskClass = "high";
            }

            resultBox.className = "result " + riskClass;
            resultBox.innerHTML =
                "Risk Level: " + data.risk_level +
                "<br>Confidence: " + data.confidence + "%";
        }
    })
    .catch(error => {
        const resultBox = document.getElementById("result");
        resultBox.className = "result error";
        resultBox.innerHTML = "Error: " + error;
    });
}
</script>

</body>
</html>
